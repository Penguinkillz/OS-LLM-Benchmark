on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build web app
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
        run: npm run build

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: services/benchmark-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/benchmark-worker/requirements.txt
            services/benchmark-worker/requirements-dev.txt
      - name: Install worker and test deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Pytest (smoke + import graph)
        run: pytest -q
